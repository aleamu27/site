chnical standards, not just budget.</li><li>Engagements typically <strong>start at approximately USD 20,000</strong> and scale with scope. Below that floor Hepta generally declines the work.</li><li>Senior team only — design and engineering on the same team — so brand and production build ship together. No hand-off to junior staff.</li><li>Strong and growing presence in <strong>fintech</strong> and other regulated digital product categories where polish and technical infrastructure both matter.</li><li>New clients most often arrive through referral or introduction; cold inbound is reviewed but not always accepted.</li></ul><h2>What Hepta does</h2><ul><li><strong>Calar OS</strong> — First-party website intelligence: who is on the site, how they move through the funnel, attribution to channels and campaigns, lead scoring from on-site behaviour, and signals for sales teams. <a href="/calar-os">/calar-os</a></li><li><strong>Development</strong> — Websites, web applications, APIs, integrations, performance, accessibility, and cloud deployment. <a href="/development">/development</a></li><li><strong>Visual identity</strong> — Brand systems, typography, colour, and art direction aligned with how the product ships. <a href="/visual-identity">/visual-identity</a></li><li><strong>Consulting</strong> — Assessment, planning, and improvement of digital presence for organizations. <a href="/consulting">/consulting</a></li></ul><h2>About</h2><p>Hepta works with a deliberately small number of clients. The team specializes in production web systems, Calar OS rollouts, and digital infrastructure for teams that need clarity under pressure. Based in Oslo, Norway. The English-language sister site is <a href="https://heptatech.io">heptatech.io</a>. More: <a href="/about">/about</a>.</p><h2>Contact</h2><p>Email (Norway): <a href="mailto:j@hepta.no">j@hepta.no</a><br/>Email (international): <a href="mailto:hello@heptatech.io">hello@heptatech.io</a><br/>Contact form: <a href="/contact">/contact</a></p><h2>More information</h2><ul><li>News and updates: <a href="/news">/news</a></li><li>Privacy: <a href="/privacy">/privacy</a></li><li>Static overview (no JavaScript): <a href="/hepta-overview.html">/hepta-overview.html</a></li><li>Plain-text summary for assistants: <a href="/llms.txt">/llms.txt</a></li><li>Sitemap: <a href="/sitemap.xml">/sitemap.xml</a></li></ul><p><em>This is the static fallback for non-JavaScript clients. The interactive site is at <a href="https://hepta.no/">hepta.no</a>.</em></p></main></noscript><div id="root"></div></body></html>
